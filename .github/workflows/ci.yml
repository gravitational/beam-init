name: CI

on:
  - push
  - pull_request

permissions:
  contents: read # can be removed once the repo is public

env:
  # Incremental compilation makes the initial build slower and generally saves
  # less time than it costs to restore a cache when caching the target dir.
  CARGO_BUILD_INCREMENTAL: false
  RUSTFLAGS: -Dwarnings

jobs:
  rustfmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rustfmt
        run: cargo fmt --check

  test:
    name: Build and test ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-musl
          - label: linux-aarch64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Register rust problem matcher
        run: echo "::add-matcher::.github/problem-matchers/rust.json"

      - name: Clippy
        run: cargo clippy --locked --workspace --target "${{ matrix.target }}"

      - name: Build release binaries
        env:
          RUSTFLAGS: -Dwarnings -Ctarget-feature=+crt-static
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Test
        env:
          RUSTFLAGS: -Dwarnings -Ctarget-feature=+crt-static
        run: cargo test --locked --workspace --target "${{ matrix.target }}"
